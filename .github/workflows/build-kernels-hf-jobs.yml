name: Build FlashRT Kernels On HF Jobs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-kernels-hf-jobs.yml"
      - "flashrt-gemm-epilogues/**"
      - "flashrt-fp8-ffn/**"
      - "flashrt-fp8-swiglu-ffn/**"
      - "flashrt-residual-norm-quant/**"
      - "flashrt-qkv-cache-rope/**"
      - "flashrt-vla-residual-gates/**"
      - "flashrt-adaptive-norms/**"
      - "flashrt-spatiotemporal-layout/**"
      - "flashrt-fused-quant/**"
      - "flashrt-nvfp4/**"
      - "flashrt-smallm-gemm/**"
      - "flashrt-vla-video/**"
      - "MiniMaxAI-msa-blackwell/**"
      - "vl-transformer-primitives/**"
      - "diffusion-step-ops/**"
      - "turboquant-kv/**"
      - "linear-attention-primitives/**"
      - "bf16-linear-gemv/**"
      - "transformer-fused-ops/**"
      - "grouped-moe-gemv/**"
      - "linear-attention-seq-state/**"
      - "world-model-conv/**"
      - "fp8-gemm/**"
      - "fp4-fused-ops/**"
      - "fp4-gemm/**"
      - "fp8-kv-attention/**"
      - "causal-conv1d-state/**"
      - "gated-delta-attention/**"
      - "adaptive-layernorm-producers/**"
  workflow_dispatch:
    inputs:
      package:
        description: "Kernel package to build and upload"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - flashrt-gemm-epilogues
          - flashrt-fp8-ffn
          - flashrt-fp8-swiglu-ffn
          - flashrt-residual-norm-quant
          - flashrt-qkv-cache-rope
          - flashrt-vla-residual-gates
          - flashrt-adaptive-norms
          - flashrt-spatiotemporal-layout
          - flashrt-fused-quant
          - flashrt-nvfp4
          - flashrt-smallm-gemm
          - flashrt-vla-video
          - MiniMaxAI-msa-blackwell
          - vl-transformer-primitives
          - diffusion-step-ops
          - turboquant-kv
          - linear-attention-primitives
          - bf16-linear-gemv
          - transformer-fused-ops
          - grouped-moe-gemv
          - linear-attention-seq-state
          - world-model-conv
          - fp8-gemm
          - fp4-fused-ops
          - fp4-gemm
          - fp8-kv-attention
          - causal-conv1d-state
          - gated-delta-attention
          - adaptive-layernorm-producers

permissions:
  contents: read

concurrency:
  group: flashrt-hf-kernel-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - flashrt-gemm-epilogues
          - flashrt-fp8-ffn
          - flashrt-fp8-swiglu-ffn
          - flashrt-residual-norm-quant
          - flashrt-qkv-cache-rope
          - flashrt-vla-residual-gates
          - flashrt-adaptive-norms
          - flashrt-spatiotemporal-layout
          - flashrt-fused-quant
          - flashrt-nvfp4
          - flashrt-smallm-gemm
          - flashrt-vla-video
          - MiniMaxAI-msa-blackwell
          - vl-transformer-primitives
          - diffusion-step-ops
          - turboquant-kv
          - linear-attention-primitives
          - bf16-linear-gemv
          - transformer-fused-ops
          - grouped-moe-gemv
          - linear-attention-seq-state
          - world-model-conv
          - fp8-gemm
          - fp4-fused-ops
          - fp4-gemm
          - fp8-kv-attention
          - causal-conv1d-state
          - gated-delta-attention
          - adaptive-layernorm-producers

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
        if: github.event_name == 'push' || github.event.inputs.package == 'all' || github.event.inputs.package == matrix.package

      - name: Detect package changes
        id: changes
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > /tmp/changed-files.txt; then
            git diff --name-only HEAD~1 HEAD > /tmp/changed-files.txt
          fi
          if grep -qE "^${{ matrix.package }}/" /tmp/changed-files.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Kernel Hub repo exists for ${{ matrix.package }}
        if: (github.event_name == 'push' && steps.changes.outputs.changed == 'true') || github.event.inputs.package == 'all' || github.event.inputs.package == matrix.package
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          python -m pip install --quiet --upgrade "huggingface_hub>=1.1.0"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          HfApi(token=os.environ["HF_TOKEN"]).create_repo(
              repo_id="flashrt/${{ matrix.package }}",
              repo_type="kernel",
              exist_ok=True,
          )
          PY

      - name: Build and upload ${{ matrix.package }} via HF Jobs
        if: (github.event_name == 'push' && steps.changes.outputs.changed == 'true') || github.event.inputs.package == 'all' || github.event.inputs.package == matrix.package
        uses: huggingface/kernel-builder-job@main
        with:
          token: ${{ secrets.HF_TOKEN }}
          # HF Jobs billing/credits are attached to the runner namespace.
          # Artifacts are still uploaded to flashrt/<package> via --repo-id below.
          namespace: liangsu9988
          flavor: cpu-xl
          timeout: "21600"
          script: |
            # The HF Jobs container is started with `set -x`, which would echo
            # secrets into streamed logs. Disable tracing before exporting.
            set +x
            export HF_TOKEN="${{ secrets.HF_TOKEN }}"
            export GIT_LFS_SKIP_SMUDGE=1
            export DEBUG=0

            git clone "${{ github.server_url }}/${{ github.repository }}" FlashRT-HF-kernels
            cd FlashRT-HF-kernels
            git checkout "${{ github.sha }}"
            cd "${{ matrix.package }}"

            nix run github:huggingface/kernels#kernel-builder -- build-and-upload \
              --max-jobs 4 \
              --cores 8 \
              --repo-id "flashrt/${{ matrix.package }}"
