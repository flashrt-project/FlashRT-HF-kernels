[general]
name = "transformer-fused-ops"
license = "Apache-2.0"
version = 1
backends = ["cuda"]

[general.cuda]
minver = "12.8"

[general.hub]
repo-id = "flashrt/transformer-fused-ops"

[torch]
include = ["csrc"]
src = [
  "torch-ext/torch_binding.cpp",
  "torch-ext/torch_binding.h",
]

[kernel.transformer_fused_ops]
backend = "cuda"
depends = ["torch"]
include = ["csrc"]
cuda-minver = "12.8"
src = [
  "csrc/kernels/rms_norm_gated_silu_qwen36.cu",
  "csrc/kernels/rms_norm_gated_silu_qwen36.cuh",
  "csrc/kernels/silu_mul_qwen36.cu",
  "csrc/kernels/silu_mul_qwen36.cuh",
  "csrc/kernels/qwen36_misc.cu",
  "csrc/kernels/qwen36_misc.cuh",
  "csrc/kernels/nexn2_misc.cu",
  "csrc/kernels/nexn2_misc.cuh",
  "csrc/kernels/nexn2_router_topk.cu",
  "csrc/kernels/nexn2_router_topk.cuh",
]
