[general]
name = "flashrt-gemm-epilogues"
license = "Apache-2.0"
version = 1
backends = ["cuda", "rocm"]

[general.hub]
repo-id = "flashrt/flashrt-gemm-epilogues"

[torch]
include = ["csrc"]
src = [
  "torch-ext/torch_binding.cpp",
  "torch-ext/torch_binding.h",
]

[kernel.flashrt_gemm_epilogues]
backend = "cuda"
depends = ["torch"]
include = ["csrc"]
src = [
  "csrc/bf16_gemm_bias_gelu.cu",
  "csrc/bf16_gemm_bias_gelu.cuh",
  "csrc/bias_gelu_quantize_fp8.cu",
  "csrc/bias_gelu_quantize_fp8.cuh",
  "csrc/channel_scale_quantize_fp8.cu",
  "csrc/channel_scale_quantize_fp8.cuh",
]

[kernel.flashrt_gemm_epilogues_rocm]
backend = "rocm"
depends = ["torch"]
include = ["csrc"]
rocm-archs = [
  "gfx942",
]
src = [
  "csrc/rocm/gemm_epilogues_rocm.hip",
  "csrc/rocm/gemm_epilogues_rocm.h",
  "csrc/rocm/hipblaslt_simple.cpp",
  "csrc/rocm/hipblaslt_simple.h",
]
