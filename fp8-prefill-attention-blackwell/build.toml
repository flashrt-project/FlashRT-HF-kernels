[general]
name = "fp8-prefill-attention-blackwell"
license = "Apache-2.0"
version = 1
backends = ["cuda"]

[general.cuda]
minver = "12.8"

[general.hub]
repo-id = "flashrt/fp8-prefill-attention-blackwell"

[torch]
include = ["csrc"]
src = ["torch-ext/torch_binding.cpp", "torch-ext/torch_binding.h"]

[kernel.fp8_prefill_attention_blackwell]
backend = "cuda"
depends = ["torch"]
include = ["csrc"]
cuda-minver = "12.8"
cuda-capabilities = ["12.0a"]
src = [
  "csrc/fmha_fp8_causal_gqa_sm120.cu",
  "csrc/fmha_fp8_causal_gqa_sm120.cuh",
]
