[general]
name = "gated-delta-attention"
license = "Apache-2.0"
version = 3
backends = ["cuda"]

[general.cuda]
minver = "12.8"

[general.hub]
repo-id = "flashrt/gated-delta-attention"

[torch]
include = ["csrc"]
src = [
  "torch-ext/torch_binding.cpp",
  "torch-ext/torch_binding.h",
]

[kernel.gated_delta_attention]
backend = "cuda"
depends = ["torch"]
include = ["csrc"]
cuda-minver = "12.8"
cuda-capabilities = ["8.0", "8.6", "8.9", "9.0", "10.0", "12.0", "12.0a", "12.1"]
src = [
  "csrc/gated_delta_attention.cu",
  "csrc/gated_delta_attention.cuh",
  "csrc/gated_delta_wy_bf16.cuh",
  "csrc/gated_delta_wy_recompute_wu_mma_fla.cu",
  "csrc/gated_delta_wy_bf16_mma_fla.cu",
  "csrc/gated_delta_wy_output_o_mma_fla.cu",
]
cuda-flags = [
  "-U__CUDA_NO_BFLOAT16_CONVERSIONS__",
  "-U__CUDA_NO_BFLOAT16_OPERATORS__",
  "-U__CUDA_NO_BFLOAT162_OPERATORS__",
]
