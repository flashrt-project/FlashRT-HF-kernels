[general]
name = "flashrt-fused-quant"
license = "Apache-2.0"
version = 1
backends = ["cuda"]

[general.cuda]
minver = "12.8"

[general.hub]
repo-id = "flashrt/flashrt-fused-quant"

[torch]
include = ["csrc"]
src = [
  "torch-ext/torch_binding.cpp",
  "torch-ext/torch_binding.h",
]

[kernel.flashrt_fused_quant]
backend = "cuda"
depends = ["torch"]
include = ["csrc"]
cuda-minver = "12.8"
cuda-capabilities = ["12.0"]
src = [
  "csrc/silu_mul_to_nvfp4_swizzled.cu",
  "csrc/silu_mul_to_nvfp4_swizzled.cuh",
]
