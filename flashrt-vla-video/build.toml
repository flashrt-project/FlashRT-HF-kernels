[general]
name = "flashrt-vla-video"
license = "Apache-2.0"
version = 1
backends = ["cuda"]

[general.hub]
repo-id = "flashrt/flashrt-vla-video"

[torch]
include = ["csrc"]
src = [
  "torch-ext/torch_binding.cpp",
  "torch-ext/torch_binding.h",
]

[kernel.flashrt_vla_video]
backend = "cuda"
depends = ["torch"]
include = ["csrc"]
src = [
  "csrc/q_norm_rope_bf16.cu",
  "csrc/q_norm_rope_bf16.cuh",
]
