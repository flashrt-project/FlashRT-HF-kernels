[general]
name = "flashrt-fp8-swiglu-ffn"
license = "Apache-2.0"
version = 1
backends = ["cuda"]

[general.cuda]
minver = "12.8"

[general.hub]
repo-id = "flashrt/flashrt-fp8-swiglu-ffn"

[torch]
include = ["csrc"]
src = [
  "torch-ext/torch_binding.cpp",
  "torch-ext/torch_binding.h",
]

[kernel.flashrt_fp8_swiglu_ffn]
backend = "cuda"
depends = ["torch"]
include = ["csrc"]
cuda-minver = "12.8"
src = [
  "csrc/fp8_swiglu_ffn.cu",
  "csrc/fp8_swiglu_ffn.cuh",
]
