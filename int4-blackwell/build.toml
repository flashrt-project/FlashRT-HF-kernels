[general]
name = "int4-blackwell"
version = 1
license = "Apache-2.0"
backends = ["cuda"]

[general.cuda]
minver = "12.8"
maxver = "13"

[general.hub]
repo-id = "flashrt/int4-blackwell"

[torch]
pyext = [
    "py",
    "cubin",
]
src = [
    "torch-ext/torch_binding.cpp",
    "torch-ext/torch_binding.h",
]

[kernel.int4_blackwell]
backend = "cuda"
cuda-capabilities = ["12.0a", "12.1"]
cuda-minver = "12.8"
depends = ["torch"]
src = ["csrc/arch_guard.cu"]
