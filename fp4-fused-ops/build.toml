[general]
name = "fp4-fused-ops"
license = "Apache-2.0"
version = 1
backends = ["cuda"]

[general.cuda]
minver = "12.8"

[general.hub]
repo-id = "flashrt/fp4-fused-ops"

[torch]
include = ["csrc", "csrc/quantize"]
src = [
  "torch-ext/torch_binding.cpp",
  "torch-ext/torch_binding.h",
]

[kernel.fp4_fused_ops]
backend = "cuda"
depends = ["torch", "cutlass_4_0"]
include = ["csrc", "csrc/quantize"]
cuda-minver = "12.8"
cuda-capabilities = ["12.0a"]
src = [
  "csrc/fused_fp4/norm_silu_fp4_sfa.cu",
  "csrc/fused_fp4/norm_silu_fp4_sfa.cuh",
  "csrc/fused_fp4/dequantize_fp4_sfa.cu",
  "csrc/fused_fp4/dequantize_fp4_sfa.cuh",
  "csrc/fused_fp4/res_rms_fp4_sfa_v2.cu",
  "csrc/fused_fp4/res_rms_mul_fp4_sfa.cu",
  "csrc/fused_fp4/silu_mul_fp4_sfa_v2.cu",
  "csrc/fused_fp4/silu_mul_mul_fp4_sfa_v2.cu",
  "csrc/fused_fp4/silu_mul_two_fp4_to_fp4.cu",
  "csrc/fused_fp4/silu_mul_two_fp4_to_fp4.cuh",
  "csrc/quantize/reshape_scales_sfa.cu",
  "csrc/quantize/reshape_scales_sfa.cuh",
]
